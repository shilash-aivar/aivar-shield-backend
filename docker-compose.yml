services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aivar
      POSTGRES_PASSWORD: aivar
      POSTGRES_DB: aivar_shield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

volumes:
  pgdata:
